name: Debug Android ZIP

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        run: |
          unzip lagzero.zip -d project

      - name: Show structure
        run: |
          find project | head -200

      - name: Check gradle wrapper
        run: |
          JAR=$(find project -name gradle-wrapper.jar | head -n 1)

          echo "JAR path:"
          echo "$JAR"

          echo
          echo "File info:"
          file "$JAR"

          echo
          echo "Size:"
          ls -lh "$JAR"

          echo
          echo "Trying to read JAR:"
          unzip -l "$JAR" | head -50

      - name: Check gradlew
        run: |
          find project -name gradlew
