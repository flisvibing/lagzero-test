name: Verify Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract ZIP
        run: |
          unzip -o lagzero.zip -d project

      - name: Find wrapper
        run: |
          find project -name gradle-wrapper.jar
          find project -name gradlew

      - name: Verify wrapper
        run: |
          JAR=$(find project -name gradle-wrapper.jar | head -n 1)

          echo "JAR PATH:"
          echo "$JAR"

          echo
          echo "FILE INFO:"
          file "$JAR"

          echo
          echo "SIZE:"
          ls -lh "$JAR"

          echo
          echo "SHA256:"
          sha256sum "$JAR"

          echo
          echo "JAR CONTENTS:"
          jar tf "$JAR" | head -50
